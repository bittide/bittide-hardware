[package]
name = "bittide-sys"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["Google LLC"]
resolver = "2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = []

[dependencies]
bittide-hal = { path = "../bittide-hal" }
bittide-macros = { path = "../bittide-macros" }
crc = { version = "3.0", default-features = false }
fdt = "0.1.0"
itertools = { version = "0.14.0", default-features = false }
log = "0.4.21"
ufmt = "0.2.0"
zerocopy = { version = "0.7", default-features = false, features = ["byteorder", "derive"] }

[dependencies.heapless]
version = "0.8"
features = ["ufmt"]

[dependencies.rand]
version = "0.8.3"
features = ["small_rng"]
default-features = false

[dependencies.smoltcp]
version = "0.12.0"
default-features = false
features = ["log", "medium-ip", "medium-ethernet", "proto-ipv4", "socket-tcp"]

[dev-dependencies]
lazy_static = "1.0"
libc = "0.2"
object = { version = "0.28", features = ["write"] }
proptest = "1.0"
rand = "0.8"
tempfile = "3"
test-strategy = "0.2.0"
