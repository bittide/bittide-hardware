[package]
name = "addressable_bytes_wb_test"
version = "0.1.0"
authors = ["Google LLC"]
edition = "2021"

[lints]
workspace = true

[dependencies]
clash-bindings = { git = "https://github.com/QBayLogic/clash-protocols-memmap", rev = "745be2eff82fd8d712b0e50d825837d2f39fb920" }
clash-macros = { git = "https://github.com/QBayLogic/clash-protocols-memmap", rev = "745be2eff82fd8d712b0e50d825837d2f39fb920" }
bittide-hal = { path = "../../../firmware-support/bittide-hal" }
bittide-macros = { path = "../../../firmware-support/bittide-macros" }
bittide-sys = { path = "../../../firmware-support/bittide-sys" }
heapless = "0.8.0"
riscv = { version = "0.11.1", features = ["critical-section-single-hart"] }
riscv-rt = "0.12.2"
ufmt = "0.2.0"

[build-dependencies]
bittide-build-utils = { path = "../../../firmware-support/bittide-build-utils" }

[profile.dev]
panic = "abort"

[profile.release]
debug = true
lto = true
opt-level = "z"
panic = "abort"
