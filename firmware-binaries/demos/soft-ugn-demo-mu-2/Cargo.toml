[package]
name = "soft-ugn-demo-mu-2"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["Google LLC"]

[dependencies]
riscv = "^0.10"
riscv-rt = "0.11.0"
bittide-sys = { path = "../../../firmware-support/bittide-sys" }
bittide-hal = { path = "../../../firmware-support/bittide-hal" }
ufmt = "0.2.0"
heapless = "0.8.0"
zerocopy = { version = "0.7", default-features = false }

[dependencies.smoltcp]
version = "0.12.0"
default-features = false
features = ["log", "medium-ip", "medium-ethernet", "proto-ipv4", "socket-tcp"]

[dependencies.log]
version = "0.4.21"
features = ["max_level_trace", "release_max_level_debug"]

[build-dependencies]
memmap-generate = { path = "../../../firmware-support/memmap-generate" }
